name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as pre-release (next tag)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: |
          IS_PRE="${{ github.event.release.prerelease || inputs.prerelease }}"
          if [[ "$IS_PRE" == "true" ]]; then
            npm publish --tag next
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
